# Vinyl Display — deployed on Dokploy, fronted by a Traefik on a SEPARATE box.
#
# Because Traefik runs on another machine it can't auto-discover this container
# via Docker labels, so we publish a host port and register the backend in
# Traefik's dynamic (file) config instead. See deploy/traefik-vinyl.yml.
#
# Topology:
#   iPad ──https──► Traefik box ──http──► 192.168.1.161:8080 (this container)
#
# DNS: vinyl.ossolab.net -> the Traefik box IP (same as your other services).
services:
  vinyl:
    build: .
    restart: unless-stopped
    environment:
      - DATA_DIR=/data
    volumes:
      - vinyl-data:/data
    ports:
      - "8080:8080" # published on the Dokploy host so Traefik can reach it

volumes:
  vinyl-data:
