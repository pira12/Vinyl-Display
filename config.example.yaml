# Copy to config.yaml and edit for your setup.

audio:
  device: null            # USB capture device name or index; null = system default.
                          # Run `python -m backend.main --list-devices` to see options.
  samplerate: 44100
  channels: 2
  buffer_seconds: 12      # length of the rolling audio buffer kept in memory
  query_seconds: 10       # how much recent audio to hand the recognizer per query
  silence_rms: 0.01       # input RMS below this counts as silence (needle up / gap)
  tmp_dir: null           # scratch dir for the query WAV; null = RAM (/dev/shm)

recognition:
  backend: olaf           # "olaf" for real fingerprinting, "mock" for development
  olaf_bin: olaf          # path to the olaf executable
  olaf_db: ~/.olaf/db     # olaf fingerprint database location
  interval_seconds: 20      # slow cadence: re-sync the play clock for drift
  fast_interval_seconds: 3  # fast cadence: lock on quickly at track changes
  min_match_score: 5        # minimum olaf match count to accept a result

metadata:
  # MusicBrainz asks for a descriptive User-Agent with contact info. No account needed.
  musicbrainz_useragent: "VinylDisplay/0.1 ( you@example.com )"
  cache_dir: ~/.cache/vinyl-display

lyrics:
  enabled: true           # fetch time-synced lyrics from LRCLIB (free, no account)

playback:
  speed_factor: 1.0       # turntable speed correction (e.g. 33.4 / 33.33 = 1.002)

server:
  host: 0.0.0.0
  port: 8080
